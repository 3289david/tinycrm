name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install deps
        run: cd website && npm ci

      - name: Sync docs content from app/docs/
        run: |
          cp app/docs/components.tsx website/app/docs/components.tsx
          cp app/docs/DocsNav.tsx    website/app/docs/DocsNav.tsx
          cp app/docs/layout.tsx     website/app/docs/layout.tsx
          cp app/docs/page.tsx       website/app/docs/page.tsx
          mkdir -p website/app/docs/{installation,nginx,stripe,invoicing,admin,scaling}
          cp app/docs/installation/page.tsx website/app/docs/installation/page.tsx
          cp app/docs/nginx/page.tsx        website/app/docs/nginx/page.tsx
          cp app/docs/stripe/page.tsx       website/app/docs/stripe/page.tsx
          cp app/docs/invoicing/page.tsx    website/app/docs/invoicing/page.tsx
          cp app/docs/admin/page.tsx        website/app/docs/admin/page.tsx
          cp app/docs/scaling/page.tsx      website/app/docs/scaling/page.tsx

      - name: Build static export
        run: cd website && npm run build
        env:
          BASE_PATH: /tinycrm

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
